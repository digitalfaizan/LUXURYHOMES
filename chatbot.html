<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Priya — Luxury Homes AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:#f5f5f5; min-height:100vh; }

    #lh-chat-btn {
      position:fixed; bottom:24px; right:24px;
      width:60px; height:60px; border-radius:50%;
      background:#25D366; border:none; cursor:pointer;
      font-size:26px; display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 24px rgba(37,211,102,0.50);
      transition:transform 0.2s; z-index:9999; position:fixed;
    }
    #lh-chat-btn:hover { transform:scale(1.08); }

    #lh-notif {
      position:absolute; top:-3px; right:-3px;
      width:21px; height:21px; background:#ef4444; color:#fff;
      border-radius:50%; font-size:11px; font-weight:700;
      display:none; align-items:center; justify-content:center;
      border:2px solid #fff;
    }

    #lh-chat-window {
      position:fixed; bottom:96px; right:24px; width:350px;
      background:#fff; border:1px solid #e5e7eb; border-radius:20px;
      overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.18);
      display:none; flex-direction:column; z-index:9999;
      animation:lhUp 0.28s ease; max-height:560px;
    }
    #lh-chat-window.open { display:flex; }
    @keyframes lhUp {
      from { opacity:0; transform:translateY(14px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    #lh-chat-head {
      background:#1C2B4A; padding:14px 16px;
      display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
    }
    .lh-head-left { display:flex; align-items:center; gap:11px; }
    .lh-head-avatar {
      width:38px; height:38px; background:#B8912A; color:#fff;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:16px; flex-shrink:0;
    }
    .lh-head-name { color:#fff; font-size:14px; font-weight:600; display:block; }
    .lh-head-status { color:#86efac; font-size:11px; }
    #lh-close-btn {
      background:transparent; border:none; color:rgba(255,255,255,0.65);
      font-size:18px; cursor:pointer; padding:4px; transition:color 0.2s;
    }
    #lh-close-btn:hover { color:#fff; }

    #lh-msgs {
      flex:1; overflow-y:auto; padding:16px 12px;
      display:flex; flex-direction:column; gap:12px;
      background:#f9f8f6; scroll-behavior:smooth; max-height:360px;
    }
    #lh-msgs::-webkit-scrollbar { width:4px; }
    #lh-msgs::-webkit-scrollbar-thumb { background:#ddd; border-radius:4px; }

    .lh-row { display:flex; gap:7px; align-items:flex-end; }
    .lh-row.bot  { justify-content:flex-start; }
    .lh-row.user { justify-content:flex-end; }

    .lh-mini-avatar {
      width:28px; height:28px; background:#1C2B4A; color:#fff;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:700; flex-shrink:0;
    }

    .lh-bubble {
      padding:10px 13px; border-radius:16px 16px 16px 3px;
      max-width:82%; background:#fff; border:1px solid #e5e7eb;
      box-shadow:0 1px 4px rgba(0,0,0,0.06);
    }
    .lh-row.user .lh-bubble {
      background:#1C2B4A; border-color:transparent;
      border-radius:16px 16px 3px 16px;
    }
    .lh-bubble p { font-size:13.5px; line-height:1.6; margin:0; color:#1a1a1a; }
    .lh-row.user .lh-bubble p { color:#fff; }
    .lh-time { font-size:10px; color:#9ca3af; margin-top:4px; display:block; }
    .lh-row.user .lh-time { color:rgba(255,255,255,0.55); }

    .lh-typing { display:flex; gap:4px; padding:4px 0; align-items:center; }
    .lh-typing span {
      width:7px; height:7px; background:#9ca3af;
      border-radius:50%; animation:lhDot 1.2s infinite;
    }
    .lh-typing span:nth-child(2) { animation-delay:0.2s; }
    .lh-typing span:nth-child(3) { animation-delay:0.4s; }
    @keyframes lhDot {
      0%,60%,100% { transform:translateY(0); opacity:0.4; }
      30% { transform:translateY(-6px); opacity:1; }
    }

    .lh-quick { display:flex; flex-wrap:wrap; gap:7px; padding:2px 4px 4px; }
    .lh-quick button {
      background:#fff; border:1.5px solid #B8912A; color:#B8912A;
      padding:6px 13px; border-radius:50px; font-size:12.5px;
      font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.18s;
    }
    .lh-quick button:hover { background:#B8912A; color:#fff; }

    .lh-wa-btn {
      display:inline-flex; align-items:center; gap:6px;
      background:#25D366; color:#fff !important;
      padding:9px 16px; border-radius:50px; font-size:13px;
      font-weight:700; margin-top:9px; text-decoration:none; transition:background 0.2s;
    }
    .lh-wa-btn:hover { background:#20bd5a; }

    #lh-input-row {
      display:flex; align-items:center; padding:10px 12px; gap:8px;
      border-top:1px solid #e5e7eb; background:#fff; flex-shrink:0;
    }
    #lh-input {
      flex:1; background:#f3f1ec; border:1.5px solid #e2ddd4;
      border-radius:50px; padding:9px 16px; font-size:13.5px;
      color:#1a1a1a; font-family:inherit; outline:none; transition:border-color 0.2s;
    }
    #lh-input:focus { border-color:#B8912A; }
    #lh-input::placeholder { color:#9ca3af; }

    #lh-send {
      width:36px; height:36px; border-radius:50%;
      background:#1C2B4A; color:#fff; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:background 0.2s, transform 0.15s;
    }
    #lh-send:hover { background:#B8912A; transform:scale(1.05); }

    #lh-footer {
      text-align:center; font-size:10.5px; color:#9ca3af;
      padding:7px; background:#fff; border-top:1px solid #f0ece6;
      flex-shrink:0; margin:0;
    }

    @media (max-width:480px) {
      #lh-chat-window { width:calc(100vw - 20px); right:10px; bottom:88px; }
      #lh-chat-btn { bottom:74px; right:14px; }
      #lh-msgs { max-height:55vh; }
    }
  </style>
</head>
<body>

  <button id="lh-chat-btn" onclick="lhToggle()" aria-label="Chat with Priya">
    <span id="lh-icon">💬</span>
    <span id="lh-notif">1</span>
  </button>

  <div id="lh-chat-window" aria-hidden="true">
    <div id="lh-chat-head">
      <div class="lh-head-left">
        <div class="lh-head-avatar">P</div>
        <div>
          <span class="lh-head-name">Priya · Luxury Homes</span>
          <span class="lh-head-status">● Online — replies instantly</span>
        </div>
      </div>
      <button id="lh-close-btn" onclick="lhToggle()">✕</button>
    </div>

    <div id="lh-msgs"></div>

    <div id="lh-input-row">
      <input type="text" id="lh-input"
        placeholder="Ask about properties..."
        onkeydown="if(event.key==='Enter')lhSend()"
        autocomplete="off" />
      <button id="lh-send" onclick="lhSend()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p id="lh-footer">Powered by AI · Your info stays private 🔒</p>
  </div>
  </body>
</html>
